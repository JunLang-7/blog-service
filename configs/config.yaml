Server:
  RunMode: debug
  HttpPort: 8000
  ReadTimeout: 60
  WriteTimeout: 60
App:
  DefaultPageSize: 10
  MaxPageSize: 100
  DefaultContextTimeout: 60
  LogSavePath: storage/logs
  LogFileName: app
  LogFileExt: .log
  UploadSavePath: storage/uploads
  UploadServerUrl: http://127.0.0.1:8000/static
  UploadImageMaxSize: 5  # MB
  UploadImageAllowExts:
    - .jpg
    - .jpeg
    - .png
JWT:
  Secret: your_username
  Issuer: blog-service
  Expire: 7200
Database:
  DBType: mysql
  Username: your_username
  Password: your_password
  Host: 127.0.0.1:3307
  DBName: blog_service
  TablePrefix: blog_
  Charset: utf8mb4
  ParseTime: True
  MaxIdleConns: 10
  MaxOpenConns: 30
Redis:
  Addr: 127.0.0.1:6379
  Password: your_password
  DB: 0
  PoolSize: 10
Email:
  Host: smtp.qq.com
  Port: 465
  Username: your_email@example.com
  Password: your_email_password
  IsSSL: true
  From: your_email@example.com
  To:
    - your_email@example.com
    - another_email@example.com